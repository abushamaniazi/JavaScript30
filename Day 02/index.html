<!DOCTYPE html>
<html>
    <head>
        <title>clock</title>
    </head>
    <body>
        <h1 class="clck">clock</h1>
        <div class="clock">
            <div class="clockFace">
                <div class="hand hourHand"></div>
                <div class="hand minHand"></div>
                <div class="hand secHand"></div>
            </div>
        </div>
        <div class="digTime">
            <span class="hrs"></span>:<span class="mins"></span>:<span class="secs"></span>
        </div>
    </body>

    <script>
        const secHand = document.querySelector(".secHand");
        const minHand = document.querySelector(".minHand");
        const hourHand = document.querySelector(".hourHand");
        const hrs = document.querySelector(".hrs");
        const mins = document.querySelector(".mins");
        const secs = document.querySelector(".secs");
        
        function setTime() {
            const time = new Date();
            
            const seconds = time.getSeconds();
            const secondsDegrees = ((seconds / 60) * 360) + 90;
            if (seconds < 10) {
                secs.innerHTML = "0" + seconds;
            } else {
                secs.innerHTML = seconds;
            }
            if (seconds === 0) {
                secHand.style.transition = "none";
            } else {
                secHand.style.transition = "all 0.05s";
            }
            secHand.style.transform = `rotate(${secondsDegrees}deg)`;

            const minutes = time.getMinutes();
            const minutesDegrees = ((minutes / 60) * 360) + ((seconds / 60) * 6) + 90;
            if (minutes < 10) {
                mins.innerHTML = "0" + minutes;
            } else {
                mins.innerHTML = minutes;
            }
            if (minutes === 0) {
                minHand.style.transition = "none";
            } else {
                minHand.style.transition = "all 0.05s";
            }
            minHand.style.transform = `rotate(${minutesDegrees}deg)`;

            const hours = time.getHours();
            const hoursDegrees = ((hours / 12) * 360) + ((minutes / 60) * 30) + 90;
            if (hours < 10) {
                hrs.innerHTML = "0" + hours;
            } else {
                hrs.innerHTML = hours;
            }
            if (hours === 0) {
                hourHand.style.transition = "none";
            } else {
                hourHand.style.transition = "all 0.05s";
            }
            hourHand.style.transform = `rotate(${hoursDegrees}deg)`;
        }
        setInterval(setTime, 1000);
    </script>

    <style>
        html {
            background: #1f1f1f;
            font-family: 'JetBrains Mono', monospace;
        }
        body {
            padding: 0px;
            margin: 0px;
        }
        .clck {
            position: relative;
            display: flex;
            color: wheat;
            font-size: 3em;
            left: 0;
            right: 0;
            justify-content: center;
            margin: 0px;
        }
        .clock {
            display: flex;
            margin-top: 50px;
            justify-content: center;
        }
        .clockFace {
            position: relative;
            width: 400px;
            height: 400px;
            border: 4px solid white;
            border-radius: 400px;
        }
        .hand {
            position: absolute;
            width: 45%;
            background: white;
            height: 4px;
            top: 50%;
            margin-top: -2px;
            transform: rotate(90deg);
            transform-origin: 100%;
            transition: all 0.05s;
            transition-timing-function: cubic-bezier(0.73, 0.16, 0.07, 2.33);
        }
        .secHand {
            width: 25%;
            left: 25%;
        }
        .minHand {
            width: 35%;
            left: 15%;
        }
        .hourHand {
            left: 5%;
        }
        .digTime {
            color: white;
            font-size: 2em;
            position: absolute;
            display: flex;
            left: 0;
            right: 0;
            justify-content: center;
            padding-top: 50px;
        }
    </style>
</html>
